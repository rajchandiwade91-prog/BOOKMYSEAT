<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}BookMySeat{% endblock %}</title>

    <!-- Bootstrap + Icons -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(to right, #f8cdda, #f7a1b5);
        min-height: 100vh;
      }

      /* Navbar */
      .navbar {
        background-color: #2c2f36 !important;
        padding: 12px 20px;
      }

      .navbar-brand {
        color: #fff !important;
        font-weight: bold;
        font-size: 20px;
      }

      .navbar-nav .nav-link {
        color: #ddd !important;
        margin-left: 15px;
      }

      .navbar-nav .nav-link:hover {
        color: #fff !important;
      }

      /* Page Title */
      .page-title {
        text-align: center;
        color: white;
        margin: 30px 0;
        font-size: 40px;
        font-weight: 600;
      }

      /* Card Design */
      .card {
        border: none;
        border-radius: 20px;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .card img {
        height: 250px;
        object-fit: cover;
      }

      .card-body {
        text-align: center;
      }

      /* Buttons */
      .btn-custom {
        background: linear-gradient(to right, #ff7e5f, #feb47b);
        border: none;
        border-radius: 20px;
        color: white;
        padding: 8px 15px;
      }

      .btn-custom:hover {
        opacity: 0.9;
      }

      /* Search / Filter Bar */
      .search-box {
        background: white;
        padding: 15px;
        border-radius: 30px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        margin-bottom: 30px;
      }

      /* Footer */
      .footer {
        background-color: #2c2f36;
        color: #fff;
        padding: 20px 0;
      }

      .footer a {
        color: #ccc;
      }

      .footer a:hover {
        color: #fff;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">🎬 BookMySeat</a>

        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ml-auto">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/movies">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'profile' %}">Profile</a>
            </li>
            <li class="nav-item">
              <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="nav-link" style="border:none;background:none;">
                  Logout
                </button>
              </form>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'register' %}">Register</a>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
      {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="footer mt-5">
      <div class="container text-center">
        <p>© 2024 BookMySeat. All rights reserved.</p>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
  </body>
</html>
